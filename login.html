<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | หจก.งานเหล็กงานลอฟท์ขอนแก่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ca8a04;
            --primary-hover: #a16207;
            --text-dark: #0f172a;
            --text-light: #f8fafc;
            --bg-dark: #0b0f19;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: radial-gradient(circle at top left, #1e293b 0%, var(--bg-dark) 80%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px rgba(202, 138, 4, 0.2);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        p.subtitle {
            font-size: 0.88rem;
            color: #94a3b8;
            margin-bottom: 28px;
        }

        /* Tabs styling */
        .tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab {
            flex: 1;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            color: #94a3b8;
        }

        .tab.active {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(202, 138, 4, 0.2);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Prompt', sans-serif;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.7);
            box-shadow: 0 0 0 3px rgba(202, 138, 4, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            font-family: 'Prompt', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #ca8a04 0%, #a16207 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(202, 138, 4, 0.2);
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(202, 138, 4, 0.35);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }

        .footer-links {
            margin-top: 24px;
            font-size: 0.82rem;
            color: #94a3b8;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .footer-links a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .guest-link {
            display: block;
            margin-top: 12px;
            color: #94a3b8;
            font-size: 0.8rem;
            text-decoration: none;
        }
        .guest-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="assets/logo.png" alt="Logo" class="logo">
        <h2>หจก.งานเหล็กงานลอฟท์ขอนแก่น</h2>
        <p class="subtitle">ระบบจัดการประวัติลูกค้าและใบเสนอราคา</p>

        <div class="tabs">
            <div class="tab active" onclick="switchRole('customer', this)">👤 ลูกค้า</div>
            <div class="tab" onclick="switchRole('admin', this)">⚙️ แอดมิน</div>
        </div>

        <div class="error-message" id="error-box"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">ชื่อผู้ใช้งาน (Username / Email)</label>
                <input type="text" id="username" required placeholder="กรอกชื่อผู้ใช้งาน">
            </div>
            
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" required placeholder="กรอกรหัสผ่าน">
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">🔐 เข้าสู่ระบบ</button>
        </form>

        <div class="footer-links" id="register-footer">
            ยังไม่มีบัญชีผู้ใช้? <a href="register.html">สมัครสมาชิกใหม่ที่นี่</a>
        </div>

        <a href="estimate.html" class="guest-link">🏠 กลับสู่หน้าประเมินราคาชิ้นงาน</a>
    </div>

    <script>
        let currentRole = 'customer';

        function switchRole(role, el) {
            currentRole = role;
            
            // Toggle active tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            // Show/hide registration footer depending on role
            const registerFooter = document.getElementById('register-footer');
            if (role === 'admin') {
                registerFooter.style.visibility = 'hidden';
            } else {
                registerFooter.style.visibility = 'visible';
            }
            
            // Clear errors
            document.getElementById('error-box').style.display = 'none';
        }

        function handleLogin(e) {
            e.preventDefault();
            const errorBox = document.getElementById('error-box');
            const submitBtn = document.getElementById('submit-btn');
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Get webhook URL
            const webhookUrl = localStorage.getItem('google_sheet_webhook_url');
            if (!webhookUrl) {
                errorBox.innerHTML = '❌ กรุณาตั้งค่า Google Sheets Web App URL ในระบบหน้าใบเสนอราคาก่อนครับ (กดปุ่ม "ตั้งค่าชีท")<br><br><a href="setup_guide.html" target="_blank" style="color: var(--primary); font-weight: bold; text-decoration: underline;">📖 คลิกเพื่อดูวิธีเชื่อมต่อ Google Sheets ทีละขั้นตอน (ทำได้ใน 1 นาที)</a>';
                errorBox.style.display = 'block';
                return;
            }

            errorBox.style.display = 'none';
            submitBtn.innerText = '⏳ กำลังเข้าสู่ระบบ...';
            submitBtn.disabled = true;

            // Call Sheets API backend
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8' // Prevents CORS preflight OPTIONS request
                },
                body: JSON.stringify({
                    action: 'login',
                    username: username,
                    password: password
                })
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'success') {
                    // Check if role matches selected tab
                    if (res.user.role !== currentRole) {
                        errorBox.innerText = `❌ บัญชีนี้ไม่มีสิทธิ์เข้าใช้งานในฐานะ ${currentRole === 'admin' ? 'แอดมิน' : 'ลูกค้า'} ครับ`;
                        errorBox.style.display = 'block';
                        submitBtn.innerText = '🔐 เข้าสู่ระบบ';
                        submitBtn.disabled = false;
                        return;
                    }

                    // Save session details
                    localStorage.setItem('user_session', JSON.stringify(res.user));
                    
                    // Show success
                    submitBtn.innerText = '✔️ สำเร็จ!';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    errorBox.innerText = '❌ ' + res.message;
                    errorBox.style.display = 'block';
                    submitBtn.innerText = '🔐 เข้าสู่ระบบ';
                    submitBtn.disabled = false;
                }
            })
            .catch(err => {
                errorBox.innerText = '❌ เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์ กรุณาลองใหม่อีกครั้ง';
                errorBox.style.display = 'block';
                submitBtn.innerText = '🔐 เข้าสู่ระบบ';
                submitBtn.disabled = false;
                console.error(err);
            });
            
            // Wait, let's write the fetch using standard CORS (omit mode: 'no-cors') so we can read the response!
            // Let's use a standard fetch block:
        }
    </script>
</body>
</html>
